     <title>Bunny</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

    :root {
        --bg-white: #ffffff;
        --text-main: #555555;
        --text-light: #999999;
        --icon-gray: #7a7a7a;
        --widget-bg: rgba(255, 255, 255, 0.85);
        --app-bg: #fdfdfd;
        --shadow: 0 4px 12px rgba(0, 0, 0, 0.03);
        --border-light: rgba(0, 0, 0, 0.04);
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        background-color: #e0e0e0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    /* 核心屏幕容器（无外壳） */
    .screen {
        width: 100%;
        max-width: 430px; /* 模拟大屏手机宽度 */
        height: 100vh;
        max-height: 932px;
        background-color: var(--bg-white);
        /* 满铺浅灰色小爱心暗纹 */
        background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 25C20 25 14 21 14 16.2C14 13.8 15.6 12.2 18 12.2C19.2 12.2 20 13 20 13C20 13 20.8 12.2 22 12.2C24.4 12.2 26 13.8 26 16.2C26 21 20 25 20 25Z' fill='%23f4f4f4'/%3E%3C/svg%3E");
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    /* --- 1. 顶部状态栏 --- */
    .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 24px;
        font-size: 14px;
        font-weight: 500;
        color: var(--text-main);
        z-index: 10;
    }
    .status-left, .status-right {
        display: flex;
        align-items: center;
        gap: 6px;
    }
    /* 左上角实时时间加粗 */
    .status-left .real-time {
        font-weight: 700; 
    }
    .icon-signal { width: 16px; height: 14px; fill: var(--icon-gray); }
    .battery-container {
        width: 22px; height: 11px;
        border: 1px solid var(--icon-gray);
        border-radius: 3px;
        padding: 1px;
        position: relative;
    }
    .battery-container::after {
        content: ''; position: absolute;
        right: -3px; top: 2px; width: 2px; height: 5px;
        background: var(--icon-gray); border-radius: 0 2px 2px 0;
    }
    .battery-level {
        height: 100%; background: var(--text-main);
        border-radius: 1px; width: 100%;
    }

    /* 内容滚动区 */
    .content {
        flex: 1;
        overflow-y: auto;
        padding: 10px 20px 100px 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }
    .content::-webkit-scrollbar { display: none; }

    /* --- 1. 通栏核心组件：音乐播放器 --- */
    .music-widget {
        width: 100%; height: 160px;
        border-radius: 24px;
        position: relative;
        overflow: hidden;
        box-shadow: var(--shadow);
        color: var(--text-main);
        display: flex; flex-direction: column; justify-content: space-between;
        padding: 16px;
        border: 1px solid var(--border-light);
        cursor: pointer; /* 增加鼠标指针 */
    }
    /* 树枝雪景背景 - 不透明度提高到 0.5 */
    .music-bg {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background-image: url('https://images.unsplash.com/photo-1478265409131-1f65c88f965c?auto=format&fit=crop&w=600&q=80');
        background-size: cover; background-position: center;
        opacity: 0.5; z-index: 1;
    }
    .music-widget::before {
        content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(to bottom, rgba(255,255,255,0.7), rgba(255,255,255,0.95));
        z-index: 2;
    }
    .music-content { position: relative; z-index: 3; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
    
    .music-top { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-light); }
    .music-top-left { display: flex; align-items: center; gap: 4px; }
    
    .music-middle { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: -10px;}
    .music-nickname { font-size: 13px; font-weight: 500; }
    /* 加大右上角头像尺寸 */
    .music-avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; cursor: pointer; }

    .music-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
    .music-controls { display: flex; gap: 12px; align-items: center; }
    .music-controls svg { width: 18px; height: 18px; fill: var(--text-main); }
    .music-lyrics { font-size: 11px; color: var(--text-light); letter-spacing: 0.5px; }

    /* 通用分栏布局 */
    .split-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
    }

    /* --- 2. 中上区域 --- */
    /* 左侧：纯爱心形状且无底图 */
    .cat-heart-widget {
        aspect-ratio: 1;
        background: transparent;
        border-radius: 0;
        box-shadow: none;
        display: flex; justify-content: center; align-items: center;
        border: none;
    }
    .cat-heart-mask {
        width: 100%; height: 100%;
        /* 采用纯爱心SVG Mask */
        -webkit-mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'/%3E%3C/svg%3E");
        -webkit-mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        -webkit-mask-position: center;
        background-image: url('https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=400&q=80');
        background-size: cover; background-position: center;
        cursor: pointer;
    }

    /* 右侧：2x2 App区 */
    .app-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 12px;
    }
    .app-item {
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    }
    .app-icon {
        width: 54px; height: 54px;
        background: var(--app-bg);
        border-radius: 14px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.02), inset 0 0 0 1px rgba(0,0,0,0.03);
        display: flex; justify-content: center; align-items: center;
    }
    .app-icon svg { width: 24px; height: 24px; fill: var(--text-light); }
    .app-name { font-size: 11px; color: var(--text-light); font-weight: 400; }

    /* --- 3. 中下区域 --- */
    /* 右列组件区纵向排列 */
    .widget-stack {
        display: flex; flex-direction: column; gap: 12px;
    }
    .mini-widget {
        background: rgba(255, 255, 255, 0.5); /* 改为半透明 */
        border-radius: 18px;
        padding: 12px;
        box-shadow: var(--shadow);
        border: 1px solid var(--border-light);
        display: flex; align-items: center;
        position: relative;
    }
    /* 装饰性文字组件 */
    .text-widget { justify-content: center; font-size: 10px; color: var(--text-light); letter-spacing: 1px; text-align: center;}
    
    /* 圆角矩形组件1 */
    .profile-widget-1 { gap: 10px; }
    .profile-widget-1 .w-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; cursor: pointer; flex-shrink: 0; }
    .profile-widget-1 .w-text { font-size: 13px; font-style: italic; color: var(--text-main); }
    
    /* 圆角矩形组件2 */
    .profile-widget-2 { justify-content: space-between; }
    .w-symbols { font-size: 14px; color: var(--text-main); display: flex; gap: 4px;}
    .profile-widget-2 .w-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; align-self: center; cursor: pointer; flex-shrink: 0; }

    /* --- 4. 底部导航与Dock栏 --- */
    .dock {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        height: 76px;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 30px;
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 0 10px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.04);
        border: 1px solid rgba(255,255,255,0.8);
        z-index: 100;
    }
    .dock .app-item .app-name { display: none; } /* Dock栏不显示文字 */
    .dock .app-icon { background: rgba(255,255,255,0.5); box-shadow: none; border: 1px solid rgba(0,0,0,0.02);}

    /* SVG 图标库 (内联复用) */
    .svg-defs { display: none; }

    /* --- 跟随点击的极小菜单栏样式 (极致压缩版) --- */
    .context-menu {
        position: fixed;
        background: var(--widget-bg);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        border: 1px solid var(--border-light);
        padding: 4px;
        display: none;
        flex-direction: column;
        gap: 2px;
        width: 86px;
        z-index: 1000;
    }
    .context-menu.active {
        display: flex;
    }
    .menu-btn {
        width: 100%;
        padding: 6px 4px;
        border: none;
        border-radius: 6px;
        font-size: 11px;
        background: transparent;
        color: var(--text-main);
        cursor: pointer;
        text-align: center;
        transition: 0.2s;
        font-weight: 500;
    }
    .menu-btn:hover { background: rgba(0,0,0,0.04); }
    .menu-btn:active { background: #eaeaea; }

    /* ========================================= */
    /* --- 新增：主题页面及内部组件样式 --- */
    /* ========================================= */
    .theme-page {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: var(--bg-white); z-index: 200;
        display: none; flex-direction: column;
        transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .theme-page.active {
        display: flex; transform: translateX(0);
    }
    .theme-header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 20px 24px 12px 24px; font-size: 15px; font-weight: 700;
        color: var(--text-main); border-bottom: 1px solid var(--border-light);
        background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
    }
    .theme-back { cursor: pointer; color: var(--text-light); font-size: 13px; font-weight: 500;}
    .theme-content { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 28px; padding-bottom: 60px;}
    .theme-content::-webkit-scrollbar { display: none; }
    
    .theme-section-title { font-size: 12px; font-weight: 700; color: var(--text-main); margin-bottom: -12px; padding-left: 6px; border-left: 3px solid var(--text-light); letter-spacing: 0.5px;}
    
    /* 虚拟小手机预览壁纸 (全新精致设计) */
    .virtual-phone-container { display: flex; flex-direction: column; align-items: center; gap: 12px;}
    .virtual-phone {
        width: 120px; height: 260px; border-radius: 24px; border: 6px solid #e8e8e8;
        background-color: #fafafa; background-size: cover; background-position: center;
        position: relative; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.08), inset 0 0 0 1px rgba(0,0,0,0.05);
        display: flex; flex-direction: column; justify-content: space-between; padding: 12px 8px 8px 8px;
        transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        overflow: hidden;
    }
    .virtual-phone:active { transform: scale(0.95); }
    /* 刘海/灵动岛设计 */
    .virtual-phone::before {
        content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
        width: 40px; height: 12px; background: #e8e8e8;
        border-radius: 0 0 8px 8px; z-index: 2;
    }
    .vp-time { font-size: 10px; font-weight: 700; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.4); text-align: center; margin-top: 6px; z-index: 3; position: relative;}
    .vp-dock { height: 20px; background: rgba(255,255,255,0.4); border-radius: 10px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); margin-bottom: 2px; z-index: 3; position: relative; border: 1px solid rgba(255,255,255,0.3);}
    .vp-hint { font-size: 10px; color: var(--text-light); font-weight: 500;}

    /* 图标网格 */
    .theme-icons-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px 12px;}
    .ti-item { display: flex; flex-direction: column; align-items: center; gap: 6px;}
    .ti-icon { 
        width: 48px; height: 48px; background: var(--app-bg); border-radius: 14px; 
        box-shadow: 0 2px 8px rgba(0,0,0,0.03); display: flex; justify-content: center; align-items: center; 
        cursor: pointer; background-size: cover; background-position: center; border: 1px solid var(--border-light);
        transition: transform 0.2s;
    }
    .ti-icon:active { transform: scale(0.92); }
    .ti-icon svg { width: 22px; height: 22px; fill: var(--text-light); pointer-events: none;}
    .ti-name { font-size: 10px; color: var(--text-light); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%;}

    /* 字体设置 */
    .theme-font-setting { display: flex; gap: 10px; }
    .theme-font-setting input { flex: 1; padding: 10px 14px; border: 1px solid #eaeaea; border-radius: 12px; font-size: 12px; outline: none; background: #fafafa; color: var(--text-main); transition: border 0.2s;}
    .theme-font-setting input:focus { border-color: #ccc; }
    .theme-font-setting button { padding: 0 16px; background: var(--text-main); color: #fff; border: none; border-radius: 12px; font-size: 12px; cursor: pointer; font-weight: 500; transition: background 0.2s;}
    .theme-font-setting button:active { background: #333; }
</style>
</head>

<div class="screen">
    <!-- 顶部状态栏 -->
    <header class="status-bar">
        <div class="status-left">
            <span class="real-time">00:00</span>
        </div>
        <div class="status-right">
            <!-- 五根竖线样式的蜂窝网络 -->
            <svg class="icon-signal" viewBox="0 0 24 24">
                <rect x="1.5" y="14" width="2.5" height="8" rx="1"/>

        <!-- 2. 中上区域 -->
        <div class="split-layout">

            <!-- 右侧：2x2 App区 -->
            <div class="app-grid">

        <div class="split-layout">

                <div class="app-item">

            <!-- 右侧：纵向排列组件区 -->
            <div class="widget-stack">
                <!-- 装饰性文字，绑定 data-text-key 修改文本 -->
                <div class="mini-widget text-widget" data-text-key="text-deco" style="cursor: pointer;">
                    ⊹♡┈ 𓏴 𝒫𝒾𝓃𝓀 𝒱𝑒𝓁𝓋𝑒𝓉 𓏴 ┈♡⊹

                <!-- 头像 + 英文 -->
                <div class="mini-widget profile-widget-1">
                    <!-- 绑定 data-img-key 修改图片 -->
                    <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=100&q=80" class="w-avatar" alt="Avatar" data-img-key="avatar-w1">

                    <span class="w-text" data-text-key="text-wtext" style="cursor: pointer;">*愛しています</span>

                <!-- 符号 + 头像 -->
                <div class="mini-widget profile-widget-2">
                    <!-- 绑定 data-text-key 修改文本 -->
                    <div class="w-symbols" data-text-key="text-symbols" style="cursor: pointer;">⸝⸝ ♪·🖇 ⁺˳꙳✧˖°ﾟ</div>
                    <!-- 绑定 data-img-key 修改图片 -->
                    <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=100&q=80" class="w-avatar" alt="Avatar" data-img-key="avatar-w2">

    <!-- 4. 底部Dock栏 -->
    <div class="dock">
        <div class="app-item">

            <span class="app-name">Chat</span>

        <div class="app-item">
            <div class="app-icon"><svg viewBox="0 0 24 24"><use href="#ic-theme"/></svg></div>
            <span class="app-name">主题</span>
        </div>
        <div class="app-item">

    <!-- ========================================= -->
    <!-- 新增：全屏主题页面 (默认隐藏，覆盖在screen之上) -->
    <!-- ========================================= -->
    <div class="theme-page" id="theme-page">
        <div class="theme-header">
            <span class="theme-back" id="theme-back">❮ 返回</span>
            <span class="theme-title">主题设置</span>
            <span style="width:40px;"></span>
        </div>
        <div class="theme-content">
            <!-- 虚拟壁纸手机 -->
            <div class="theme-section-title">桌面壁纸</div>
            <div class="virtual-phone-container">
                <div class="virtual-phone" id="preview-wallpaper">
                    <div class="vp-time">00:00</div>
                    <div class="vp-dock"></div>
                </div>
                <div class="vp-hint">点击小手机更换壁纸</div>
            </div>

            <!-- 桌面图标 -->
            <div class="theme-section-title">桌面图标 (点击更换)</div>
            <div class="theme-icons-grid" id="theme-icons-grid">
                <!-- JS 动态生成 12 个图标预览 -->
            </div>

            <!-- 字体设置 -->
            <div class="theme-section-title">全局字体</div>
            <div class="theme-font-setting">
                <!-- 提示词修改为输入 URL -->
                <input type="text" id="font-input" placeholder="输入字体文件URL (如 .ttf/.woff)">
                <button id="btn-apply-font">应用</button>
            </div>
        </div>
    </div>

</div>

<!-- 跟随点击的纯文字极小菜单栏 -->
<div class="context-menu" id="context-menu">
    <button class="menu-btn" id="menu-url-btn">输入URL</button>
    <button class="menu-btn" id="menu-local-btn">本地文件</button>
</div>
<input type="file" id="img-file-input" accept="image/*" style="display: none;">

<script>
    // 实时时间更新 (全局共用)
    function updateTime() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const timeString = `${hours}:${minutes}`;
        
        document.querySelectorAll('.real-time, .vp-time').forEach(el => {
            el.textContent = timeString;
        });
    }
    
    // 实时电量模拟/获取
    function updateBattery() {
        const batteryFill = document.getElementById('battery-fill');
        if ('getBattery' in navigator) {
            navigator.getBattery().then(function(battery) {
                const level = Math.round(battery.level * 100);
                batteryFill.style.width = level + '%';
                battery.addEventListener('levelchange', function() {
                    batteryFill.style.width = Math.round(battery.level * 100) + '%';
                });
            });
        } else {
            batteryFill.style.width = '80%';
        }
    }

    // 初始化
    setInterval(updateTime, 1000);
    updateTime();
    updateBattery();

    // =========================================================
    // --- 纯净版 IndexedDB 持久化存储引擎 (无 LocalStorage) ---
    // =========================================================
    const dbName = "NekomimiDB_V3"; // 升级版本号，确保强制重建表
    const storeName = "customData"; 
    let db = null;
    let currentEditingImgKey = null;

    const initDB = () => {
        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains(storeName)) {
                db.createObjectStore(storeName);
            }
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            loadData(); 
        };
        request.onerror = (e) => {
            console.error("IndexedDB error:", e.target.error);
        };
    };

    const saveData = (key, data) => {
        if (!db) return;
        try {
            const tx = db.transaction(storeName, "readwrite");
            tx.objectStore(storeName).put(data, key);
        } catch(e) {
            console.error("IndexedDB save error:", e);
        }
    };

    const loadData = () => {
        if (!db) return;
        try {
            const tx = db.transaction(storeName, "readonly");
            const store = tx.objectStore(storeName);
            const request = store.openCursor(); // 游标遍历，兼容性最强
            request.onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    dispatchData(cursor.key, cursor.value);
                    cursor.continue();
                }
            };
        } catch(e) {
            console.error("IndexedDB load error:", e);
        }
    };

    const dispatchData = (key, data) => {
        if (key.startsWith('text-') || key === 'theme-font-url') {
            applyDataToElement(key, data, 'text');
        } else {
            applyDataToElement(key, data, 'img');
        }
    };

    // --- 核心：将数据应用到 DOM 元素 (包含主题扩展逻辑) ---
    const applyDataToElement = (key, data, type) => {
        if (type === 'img') {
            // 扩展1：全局壁纸持久化应用
            if (key === 'theme-wallpaper') {
                const screen = document.querySelector('.screen');
                screen.style.backgroundImage = `url('${data}')`;
                screen.style.backgroundSize = 'cover';
                screen.style.backgroundPosition = 'center';
                const preview = document.getElementById('preview-wallpaper');
                if (preview) preview.style.backgroundImage = `url('${data}')`;
                return;
            }
            // 扩展2：12个App图标持久化应用
            if (key.startsWith('icon-')) {
                const index = parseInt(key.split('-')[1]);
                const realItems = document.querySelectorAll('.screen > .content .app-item, .screen > .dock .app-item');
                if (realItems[index]) {
                    const realIcon = realItems[index].querySelector('.app-icon');
                    // 覆盖背景图，隐藏原生SVG
                    realIcon.style.backgroundImage = `url('${data}')`;
                    realIcon.style.backgroundSize = 'cover';
                    realIcon.style.backgroundPosition = 'center';
                    const svg = realIcon.querySelector('svg');
                    if (svg) svg.style.opacity = '0';
                }
                // 同步更新主题页里的预览方块
                const previewIcon = document.querySelector(`.ti-icon[data-img-key="${key}"]`);
                if (previewIcon) {
                    previewIcon.style.backgroundImage = `url('${data}')`;
                    const pSvg = previewIcon.querySelector('svg');
                    if (pSvg) pSvg.style.opacity = '0';
                }
                return;
            }
            // 扩展3：音乐组件背景图持久化应用
            if (key === 'music-bg-img') {
                const bgEl = document.querySelector('.music-bg');
                if (bgEl) bgEl.style.backgroundImage = `url('${data}')`;
                return;
            }

            // 原有逻辑：直接通过 data-img-key 绑定的元素
            const el = document.querySelector(`[data-img-key="${key}"]`);
            if (!el) return;
            if (el.tagName.toLowerCase() === 'img') {
                el.src = data;
            } else {
                el.style.backgroundImage = `url('${data}')`;
            }
        } else if (type === 'text') {
            // 扩展4：全局字体URL持久化应用 (@font-face)
            if (key === 'theme-font-url') {
                let styleTag = document.getElementById('custom-font-style');
                if (!styleTag) {
                    styleTag = document.createElement('style');
                    styleTag.id = 'custom-font-style';
                    document.head.appendChild(styleTag);
                }
                // 动态注入 @font-face 规则
                styleTag.innerHTML = `
                    @font-face {
                        font-family: 'CustomUserFont';
                        src: url('${data}');
                    }
                    * { font-family: 'CustomUserFont', 'Noto Sans SC', -apple-system, sans-serif !important; }
                `;
                const fontInput = document.getElementById('font-input');
                if (fontInput) fontInput.value = data;
                return;
            }

            // 原有逻辑：文本修改
            const el = document.querySelector(`[data-text-key="${key}"]`);
            if (!el) return;
            el.textContent = data;
        }
    };

    // --- 文本修改交互 ---
    document.querySelectorAll('[data-text-key]').forEach(el => {
        el.addEventListener('click', (e) => {
            e.stopPropagation();
            const key = el.getAttribute('data-text-key');
            const currentText = el.textContent;
            const newText = prompt('修改文案:', currentText);
            if (newText !== null && newText.trim() !== '') {
                applyDataToElement(key, newText, 'text');
                saveData(key, newText);
            }
        });
    });

    // --- 抽取菜单显示逻辑 ---
    const contextMenu = document.getElementById('context-menu');
    const showContextMenu = (e, key) => {
        e.stopPropagation();
        currentEditingImgKey = key;
        
        let x = e.clientX;
        let y = e.clientY;
        const menuWidth = 86;
        const menuHeight = 52; 
        if (x + menuWidth > window.innerWidth) x = window.innerWidth - menuWidth - 10;
        if (y + menuHeight > window.innerHeight) y = window.innerHeight - menuHeight - 10;
        
        contextMenu.style.left = x + 'px';
        contextMenu.style.top = y + 'px';
        contextMenu.classList.add('active');
    };

    // 绑定原有的图片组件点击 (包含新增的音乐背景)
    document.querySelectorAll('[data-img-key]').forEach(el => {
        el.addEventListener('click', (e) => {
            showContextMenu(e, el.getAttribute('data-img-key'));
        });
    });

    // 点击页面空白处关闭菜单
    document.addEventListener('click', (e) => {
        if (!contextMenu.contains(e.target)) {
            contextMenu.classList.remove('active');
        }
    });

    // 菜单按钮交互
    const menuUrlBtn = document.getElementById('menu-url-btn');
    const menuLocalBtn = document.getElementById('menu-local-btn');
    const fileInput = document.getElementById('img-file-input');

    menuUrlBtn.addEventListener('click', () => {
        contextMenu.classList.remove('active');
        if (currentEditingImgKey) {
            const url = prompt('请输入图片URL:');
            if (url && url.trim() !== '') {
                applyDataToElement(currentEditingImgKey, url.trim(), 'img');
                saveData(currentEditingImgKey, url.trim());
            }
        }
    });

    menuLocalBtn.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file || !currentEditingImgKey) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const base64 = event.target.result;
            applyDataToElement(currentEditingImgKey, base64, 'img');
            saveData(currentEditingImgKey, base64);
            contextMenu.classList.remove('active');
        };
        reader.readAsDataURL(file);
        fileInput.value = ''; 
    });


    // =========================================
    // --- 新增：主题页面控制与渲染逻辑 ---
    // =========================================
    const themePage = document.getElementById('theme-page');
    let isThemeRendered = false;

    // 拦截“主题”按钮点击 (通过文字内容匹配，避免修改原HTML结构)
    document.querySelectorAll('.app-item').forEach(item => {
        const nameEl = item.querySelector('.app-name');
        if (nameEl && nameEl.textContent === '主题') {
            item.addEventListener('click', () => {
                themePage.classList.add('active');
                renderThemeIcons();
            });
        }
    });

    // 关闭主题页
    document.getElementById('theme-back').addEventListener('click', () => {
        themePage.classList.remove('active');
    });

    // 动态渲染 12 个图标预览
    function renderThemeIcons() {
        if (isThemeRendered) return;
        const grid = document.getElementById('theme-icons-grid');
        // 获取真实的12个App (内容区8个 + Dock栏4个)
        const realItems = document.querySelectorAll('.screen > .content .app-item, .screen > .dock .app-item');
        
        realItems.forEach((item, index) => {
            const name = item.querySelector('.app-name').textContent;
            const svgHtml = item.querySelector('.app-icon').innerHTML;
            
            const tiItem = document.createElement('div');
            tiItem.className = 'ti-item';
            
            const tiIcon = document.createElement('div');
            tiIcon.className = 'ti-icon';
            tiIcon.innerHTML = svgHtml;
            tiIcon.setAttribute('data-img-key', `icon-${index}`); // 分配固定Key
            
            const tiName = document.createElement('div');
            tiName.className = 'ti-name';
            tiName.textContent = name;

            tiItem.appendChild(tiIcon);
            tiItem.appendChild(tiName);
            grid.appendChild(tiItem);

            // 绑定点击更换菜单
            tiIcon.addEventListener('click', (e) => {
                showContextMenu(e, `icon-${index}`);
            });
        });

        // 绑定虚拟壁纸小手机点击
        document.getElementById('preview-wallpaper').addEventListener('click', (e) => {
            showContextMenu(e, 'theme-wallpaper');
        });

        isThemeRendered = true;
        // 重新触发一次加载，把刚生成的DOM涂上保存的持久化图片
        loadData(); 
    }

    // 字体URL应用按钮
    document.getElementById('btn-apply-font').addEventListener('click', () => {
        const fontUrl = document.getElementById('font-input').value.trim();
        if (fontUrl) {
            applyDataToElement('theme-font-url', fontUrl, 'text');
            saveData('theme-font-url', fontUrl);
        }
    });

    // 启动数据库并恢复状态
    initDB();
</script>
